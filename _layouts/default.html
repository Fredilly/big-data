<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  {% seo %}
</head>
<body>
  <nav class="site-nav">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/course' | relative_url }}">Course</a>
        <a href="{{ '/cv' | relative_url }}">CV</a>
        <a href="{{ '/experience' | relative_url }}">Experience</a>
        <a href="{{ '/education' | relative_url }}">Education</a>
        <a href="{{ '/meetup' | relative_url }}">2018 Meetup</a>
      </div>
    </div>
  </nav>

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ site.time | date: '%Y' }} Fred Egbuedike &middot; 
      <a href="mailto:{{ site.email }}">{{ site.email }}</a> &middot;
      <a href="https://github.com/{{ site.github_username }}">GitHub</a> &middot;
      <a href="https://kaggle.com/{{ site.kaggle_username }}">Kaggle</a></p>
    </div>
  </footer>

<script>
async function loadChengduData() {
  const badge = document.getElementById('live-text');
  if (!badge) return;
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=30.5728&longitude=104.0668&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia/Shanghai');
    const data = await res.json();
    const t = Math.round(data.current.temperature_2m);
    const h = data.current.relative_humidity_2m;
    const codes = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',95:'⛈️'};
    const icon = codes[data.current.weather_code] || '🌤️';
    badge.innerHTML = `${icon} Chengdu now: <strong>${t}°C</strong> · ${h}% humidity · 🚇 721 km metro`;
  } catch {
    badge.innerHTML = '🚇 Chengdu Metro: 721 km · 4th longest in the world';
  }
}
loadChengduData();
</script>
</body>
</html>
